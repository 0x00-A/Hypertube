components:
  schemas:
    Movie:
      type: object
      required:
        - imdbId
        - title
        - year
        - images
        - torrents
        - downloadStatus
        - lastUpdated
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
          example: 507f1f77bcf86cd799439011
        imdbId:
          type: string
          description: IMDb unique identifier
          example: tt0111161
        title:
          type: string
          description: Movie title
          example: The Shawshank Redemption
        year:
          type: integer
          minimum: 1900
          maximum: 2026
          description: Release year
          example: 1994
        rating:
          type: number
          minimum: 0
          maximum: 10
          description: IMDb rating
          example: 9.3
        duration:
          type: integer
          description: Duration in minutes
          example: 142
        synopsis:
          type: string
          description: Movie plot summary
          example: Two imprisoned men bond over a number of years...
        genres:
          type: array
          items:
            type: string
          description: List of genres
          example: [Drama, Crime]
        originalLanguage:
          type: string
          description: Original language
          default: en
          example: en
        trailer:
          type: string
          description: YouTube trailer URL
          example: https://www.youtube.com/watch?v=6hB3S9bIaco
        cast:
          type: array
          items:
            $ref: '#/components/schemas/Cast'
          maxItems: 6
          description: Main cast members (up to 6 actors)
          example:
            - id: 3894
              name: Christian Bale
              character: Bruce Wayne / Batman
              profilePath: https://image.tmdb.org/t/p/w185/3qx2QFUbG6t6IlzR0F9k3Z6Yhf7.jpg
        images:
          type: object
          required:
            - thumbnail
            - poster
            - backdrop
          properties:
            thumbnail:
              type: string
              description: Medium-sized image for lists
              example: https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg
            poster:
              type: string
              description: Large poster image for detail view
              example: https://image.tmdb.org/t/p/original/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg
            backdrop:
              type: string
              description: Background image for detail view
              example: https://image.tmdb.org/t/p/original/kXfqcdQKsToO0OUXHcrrNCHDBzO.jpg
        torrents:
          type: array
          items:
            $ref: '#/components/schemas/Torrent'
          description: Available torrent sources
        downloadStatus:
          type: string
          enum: [not_downloaded, downloading, downloaded]
          default: not_downloaded
          description: Current download status on the server
          example: not_downloaded
        lastWatched:
          type: string
          format: date-time
          nullable: true
          description: Last time this movie was watched (for 1-month deletion rule)
          example: 2025-12-01T10:30:00Z
        localPath:
          type: string
          nullable: true
          description: Path to the downloaded file on the server
          example: /var/hypertube/movies/tt0111161.mp4
        lastUpdated:
          type: string
          format: date-time
          description: Last update timestamp
          example: 2025-12-08T10:00:00Z
        isWatched:
          type: boolean
          description: |
            Whether the authenticated user has completed watching this movie (watch progress >= 90%).
            Always `false` for unauthenticated users.
          example: false
        inWatchlist:
          type: boolean
          description: |
            Whether the authenticated user has added this movie to their watchlist.
            Always `false` for unauthenticated users.
          example: false
        userRating:
          type: number
          nullable: true
          minimum: 1
          maximum: 10
          description: |
            The authenticated user's rating for this movie (1-10 scale).
            Always `null` for unauthenticated users or if the user hasn't rated the movie.
          example: null
        topRank:
          type: integer
          nullable: true
          minimum: 1
          description: |
            Numeric position in the curated top-ranked list (seeded from `scripts/movies.csv`).
            `null` when not part of the list.
          example: 1

    Torrent:
      type: object
      required:
        - url
        - hash
        - quality
        - seeds
        - peers
        - size
        - sizeBytes
      properties:
        url:
          type: string
          description: Magnet link or torrent URL
          example: magnet:?xt=urn:btih:...
        hash:
          type: string
          description: Torrent info hash
          example: 08ada5a7a6183aae1e09d831df6748d566095a10
        quality:
          type: string
          description: Video quality
          example: 1080p
        type:
          type: string
          description: File type
          example: mp4
        videoCodec:
          type: string
          description: Video codec
          example: x264
        seeds:
          type: integer
          minimum: 0
          description: Number of seeders
          example: 150
        peers:
          type: integer
          minimum: 0
          description: Number of peers
          example: 45
        size:
          type: string
          description: Human-readable file size
          example: 1.4 GB
        sizeBytes:
          type: integer
          description: File size in bytes
          example: 1503238553
        provider:
          type: string
          description: Torrent source provider
          example: YTS

    Cast:
      type: object
      required:
        - id
        - name
        - character
      properties:
        id:
          type: integer
          description: TMDB actor ID
          example: 3894
        name:
          type: string
          description: Actor's name
          example: Christian Bale
        character:
          type: string
          description: Character name in the movie
          example: Bruce Wayne / Batman
        profilePath:
          type: string
          description: URL to actor's profile image
          example: https://image.tmdb.org/t/p/w185/3qx2QFUbG6t6IlzR0F9k3Z6Yhf7.jpg

    TrendingMovieItem:
      type: object
      required:
        - tmdbId
        - title
        - year
        - rating
        - originalLanguage
        - overview
        - genres
        - images
        - isLocal
      properties:
        tmdbId:
          type: integer
          description: TMDB movie ID
          example: 603692
        title:
          type: string
          description: Movie title
          example: John Wick Chapter 4
        year:
          type: integer
          description: Release year
          example: 2023
        rating:
          type: string
          description: TMDB rating (stringified)
          example: '7.8'
        originalLanguage:
          type: string
          description: Original language
          example: en
        overview:
          type: string
          description: Movie overview/summary
          example: With the price on his head ever increasing, John Wick uncovers a path to defeating The High Table. But before he can earn his freedom, Wick must face off against a new enemy with powerful alliances across the globe and forces that turn old friends into foes.
        genres:
          type: array
          items:
            type: string
          description: List of genre names
          example: [Action, Thriller, Crime]
        images:
          type: object
          properties:
            thumbnail:
              type: string
              description: Thumbnail image URL
              example: https://image.tmdb.org/t/p/w200/1y5C5ZIp8VYcJq2vFv6y9y4n1cT.jpg
            backdrop:
              type: string
              description: Backdrop image URL
              example: https://image.tmdb.org/t/p/original/1y5C5ZIp8VYcJq2vFv6y9y4n1cT.jpg
        isLocal:
          type: boolean
          description: Whether the movie is present in the local database
          example: false
        isWatched:
          type: boolean
          description: |
            Whether the authenticated user has completed watching this movie.
            Only present when `isLocal` is `true`. Always `false` for unauthenticated users.
          example: false
        inWatchlist:
          type: boolean
          description: |
            Whether the authenticated user has added this movie to their watchlist.
            Only present when `isLocal` is `true`. Always `false` for unauthenticated users.
          example: false
        userRating:
          type: number
          nullable: true
          minimum: 1
          maximum: 10
          description: |
            The authenticated user's rating for this movie (1-10 scale).
            Only present when `isLocal` is `true`. Always `null` for unauthenticated users.
          example: null
        topRank:
          type: integer
          nullable: true
          minimum: 1
          description: |
            Numeric position in the curated top-ranked list (seeded from `scripts/movies.csv`). Only present when `isLocal` is `true`.
          example: 1

    MovieInteraction:
      type: object
      required:
        - _id
        - userId
        - movieId
        - interactionType
      properties:
        _id:
          type: string
          example: '507f1f77bcf86cd799439011'
        userId:
          type: string
          description: MongoDB ObjectId of the user
          example: '507f1f77bcf86cd799439011'
        movieId:
          type: string
          description: MongoDB ObjectId of the movie
          example: '507f1f77bcf86cd799439022'
        interactionType:
          type: string
          enum: [watched, rated, watchlist, downloaded]
          example: watchlist
        lastWatchedPosition:
          type: number
          description: Last watched position in seconds
          example: 3600
        duration:
          type: number
          description: Movie duration in seconds
          example: 7200
        watchProgress:
          type: number
          minimum: 0
          maximum: 100
          description: Percentage watched
          example: 100
        isCompleted:
          type: boolean
          description: Whether the watch progress indicates completion
          example: true
        rating:
          type: number
          nullable: true
          minimum: 1
          maximum: 10
          description: Rating given by the user
          example: 9
        watchedAt:
          type: string
          format: date-time
          nullable: true
          description: When the movie was last watched
          example: 2025-12-01T12:00:00Z
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: When the movie was completed
          example: 2025-12-01T13:30:00Z
        createdAt:
          type: string
          format: date-time
          description: Document creation timestamp
          example: 2025-12-01T12:00:00Z
        updatedAt:
          type: string
          format: date-time
          description: Document update timestamp
          example: 2025-12-01T12:30:00Z

    ErrorResponse:
      type: object
      required:
        - status
        - message
        - path
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Failed to fetch trending movies from TMDB.
        path:
          type: string
          example: /api/v1/movies/trending

    User:
      type: object
      required:
        - _id
        - username
        - firstName
        - lastName
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
          example: 507f1f77bcf86cd799439011
        username:
          type: string
          minLength: 3
          maxLength: 30
          description: Unique username
          example: johndoe
        firstName:
          type: string
          description: User's first name
          example: John
        lastName:
          type: string
          description: User's last name
          example: Doe
        email:
          type: string
          format: email
          description: |
            User's email address. Only present when fetching your own profile (e.g., /api/v1/users/me).
          example: johndoe@example.com
        avatarUrl:
          type: string
          format: uri
          description: |
            URL to the user's avatar image. May be null or omitted if the user has not set an avatar.
          example: https://cdn.example.com/avatars/507f1f77bcf86cd799439011.png
        createdAt:
          type: string
          format: date-time
          description: |
            ISO 8601 timestamp of when the user account was created.
          example: 2024-05-01T12:34:56.789Z

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
      description: JWT access token stored in httpOnly cookie (set after login or OAuth callback)
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from login or OAuth callback (alternative to cookie auth)
