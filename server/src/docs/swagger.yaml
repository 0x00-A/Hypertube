      responses:
        '200':
          description: Paginated list of popular movies (external)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrendingMovieItem'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      total:
                        type: integer
                        example: 1000
                      totalPages:
                        type: integer
                        example: 50
                      limit:
                        type: integer
                        example: 20
                      hasNextPage:
                        type: boolean
                        example: true
                      hasPrevPage:
                        type: boolean
                        example: false
              example:
                data:
                  - tmdbId: 603692
                    title: John Wick Chapter 4
                    year: 2023
                    rating: '7.8'
                    originalLanguage: en
                    images:
                      thumbnail: https://image.tmdb.org/t/p/w200/1y5C5ZIp8VYcJq2vFv6y9y4n1cT.jpg
                    isLocal: false
                pagination:
                  page: 1
                  total: 1000
                  totalPages: 50
                  limit: 20
                  hasNextPage: true
                  hasPrevPage: false
        '502':
          description: Failed to fetch popular movies from TMDB
          content:
            application/json:
              schema:
