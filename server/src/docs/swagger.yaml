openapi: 3.1.0
info:
  title: Hypertube API
  version: 0.1.0
  description: API for Hypertube streaming platform

paths:
  /v1/auth/signup:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - username
                - firstName
                - lastName
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: SecurePass123!
                confirmPassword:
                  type: string
                  format: password
                  minLength: 8
                  example: SecurePass123!
                username:
                  type: string
                  minLength: 3
                  example: johndoe
                firstName:
                  type: string
                  example: John
                lastName:
                  type: string
                  example: Doe
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User registered successfully
                  data:
                    type: object
                    properties:
                      userId:
                        type: string
                      email:
                        type: string
                      username:
                        type: string
        '400':
          description: Validation error or user already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        message:
                          type: string
        '500':
          description: Internal server error

  /v1/auth:
    get:
      summary: Health check for auth routes
      tags:
        - Authentication
      responses:
        '200':
          description: Auth routes are working
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Auth route is working
