services:
  mongo:
    image: mongo:7.0
    container_name: mongo-dev
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - '27017:27017'
    volumes:
      - mongo_dev_data:/data/db
    environment:
        - MONGO_INITDB_DATABASE=hypertube
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hypertube-network
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: server-dev
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - hypertube-network
volumes:
  mongo_dev_data:
networks:
  hypertube-network:
    driver: bridge
