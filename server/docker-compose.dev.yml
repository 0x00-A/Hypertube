services:
  mongo:
    image: mongo:7.0
    container_name: mongo-dev
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: driver
      MONGO_INITDB_DATABASE: hypertube
    volumes:
      - mongo_dev_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 5
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: driver
      ME_CONFIG_MONGODB_URL: mongodb://admin:driver@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ntier-backend-dev
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://admin:driver@mongo:27017/hypertube?authSource=admin
      - NODE_ENV=development
      - PORT=3000
      - ENABLE_REQUEST_LOGGING=true
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run dev
volumes:
  mongo_dev_data:
