server {
    listen 80;
    server_name localhost;

    # Nginx optimization for static files
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Root directory for React app
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Proxy API requests to backend
    location ^~ /api/ {
        proxy_pass http://server:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings for API (increased for slow torrent streams)
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # Proxy health check to backend
    location = /health {
        proxy_pass http://server:3000/health;
        proxy_set_header Host $host;
    }

    # Proxy Swagger docs to backend
    location ^~ /api-docs {
        proxy_pass http://server:3000/api-docs;
        proxy_set_header Host $host;
    }

    # Proxy Swagger docs json
    location = /api-docs.json {
        proxy_pass http://server:3000/api-docs.json;
        proxy_set_header Host $host;
    }

    # Serve uploads directly (Requires volume mount in docker-compose)
    location ^~ /uploads/ {
        alias /app/uploads/;
        autoindex off;
        expires max;
        add_header Cache-Control "public, no-transform";
    }

    # Serve subtitles directly (Requires volume mount in docker-compose)
    location ^~ /api/subtitles/ {
        alias /app/public/subtitles/;
        autoindex off;
        expires max;
        add_header Cache-Control "public, no-transform";
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # React router catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
